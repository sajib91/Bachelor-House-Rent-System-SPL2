services:
  - type: web
    name: to-let-globe-php-api
    runtime: php
    rootDir: php-api
    plan: free
    autoDeploy: true
    startCommand: php -S 0.0.0.0:$PORT -t public
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: "bhms"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: SYSTEM_ADMIN_USER_ID
        value: "admin"
      - key: SYSTEM_ADMIN_PASSWORD
        sync: false
