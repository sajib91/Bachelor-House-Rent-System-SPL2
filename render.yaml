services:
  - type: web
    name: bhrs-spl-2-server
    runtime: node
    rootDir: server
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: "5001"
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ETHEREAL_HOST
        sync: false
      - key: ETHEREAL_PORT
        sync: false
      - key: ETHEREAL_SECURE
        sync: false
      - key: ETHEREAL_USER
        sync: false
      - key: ETHEREAL_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: BHRS-SPL-2
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
